<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#040010">
<meta name="description" content="두 명이 마주 앉아 즐기는 레트로웨이브 2인 벽돌깨기 대결 게임">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RETROBREAK 2P">
<link rel="manifest" href="manifest.json">
<title>RETROBREAK 2P</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#040010;overflow:hidden;touch-action:none;}
canvas{position:fixed;top:0;left:0;}
#btns{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:0 14px 14px;gap:7px;
  pointer-events:none;
}
#speedWrap{pointer-events:auto;display:flex;gap:7px;width:100%;}
.spd{
  flex:1;font-family:'Press Start 2P',monospace;font-size:10px;
  padding:8px 0;border-radius:6px;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;text-align:center;
  transition:transform 0.08s;background:rgba(8,0,24,0.72);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.spd:active{transform:scale(0.92);}
.spd.off{opacity:0.28;}
#spdSlow{border:1px solid rgba(0,230,118,0.65);color:#00e676;box-shadow:0 0 10px rgba(0,230,118,0.25);text-shadow:0 0 8px #00e676;}
#spdNorm{border:1px solid rgba(255,190,0,0.65);color:#ffbe00;box-shadow:0 0 10px rgba(255,190,0,0.25);text-shadow:0 0 8px #ffbe00;}
#spdFast{border:1px solid rgba(255,45,106,0.65);color:#ff2d6a;box-shadow:0 0 10px rgba(255,45,106,0.25);text-shadow:0 0 8px #ff2d6a;}
#btnStart{
  pointer-events:auto;display:block;
  font-family:'Press Start 2P',monospace;font-size:15px;
  padding:13px 0;width:100%;border-radius:7px;
  border:1px solid rgba(199,125,255,0.55);background:rgba(8,0,28,0.68);
  color:#c77dff;box-shadow:0 0 16px rgba(199,125,255,0.30),inset 0 0 12px rgba(199,125,255,0.07);
  text-shadow:0 0 10px #c77dff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  text-align:center;white-space:nowrap;transition:transform 0.08s,box-shadow 0.15s;
}
#btnStart:active{transform:scale(0.95);box-shadow:0 0 26px rgba(199,125,255,0.55),inset 0 0 18px rgba(199,125,255,0.13);}
#btnAction{
  pointer-events:auto;display:none;
  font-family:'Press Start 2P',monospace;font-size:15px;
  padding:13px 0;width:100%;border-radius:7px;
  border:1px solid rgba(0,212,255,0.55);background:rgba(8,0,28,0.68);
  color:#00d4ff;box-shadow:0 0 16px rgba(0,212,255,0.30),inset 0 0 12px rgba(0,212,255,0.07);
  text-shadow:0 0 10px #00d4ff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  text-align:center;white-space:nowrap;transition:transform 0.08s;
}
#btnAction:active{transform:scale(0.95);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="btns">
  <div id="speedWrap">
    <button id="spdSlow" class="spd">🐢 느림</button>
    <button id="spdNorm" class="spd">⚡ 보통</button>
    <button id="spdFast" class="spd">🔥 빠름</button>
  </div>
  <button id="btnStart">▶ 게임 시작</button>
  <button id="btnAction">▶ 계속하기</button>
</div>
<script>
// ══════════════════════════════════════════════
//  가상 좌표계: VW×VH → 실제 화면으로 ctx.scale
//  어떤 폰에서도 동일한 레이아웃 보장
// ══════════════════════════════════════════════
const VW = 400, VH = 780, VMID = VH / 2; // 390
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const RW = window.innerWidth, RH = window.innerHeight;
canvas.width  = RW; canvas.height = RH;
canvas.style.width = RW+'px'; canvas.style.height = RH+'px';
ctx.scale(RW/VW, RH/VH);  // 가상→실제 매핑

const GW = VW, GH = VH, MID = VMID;

// ── 고정 폰트 크기 (가상 픽셀, 항상 동일) ──
const F = {
  score : 45,   // 점수 숫자 (절반)
  label : 20,   // P1 / P2 HUD 라벨
  title : 38,   // RETRO / BREAK
  sub   : 21,   // 2P BATTLE
  guide : 28,   // 터치 안내 라벨
  guide2: 18,   // 터치 안내 서브
  flash : 34,   // 득점 플래시 플레이어명
  flash2: 22,   // 득점!
  count : 110,  // 카운트다운
  win   : 78,   // 승리 이름
  win2  : 52,   // 승리!
  winSub: 20,
  winSc : 26,
};
const PX = n => `${n}px "Press Start 2P",monospace`;

// ── 색상 ──
const C1='#00d4ff', C2='#ff2d6a';

// ── 게임 상수 (가상 픽셀 기준) ──
const PH   = 22, PW = 115;
const P1_Y = VH - 58;  // 722
const P2_Y = 36;
const BR   = 10;
const WIN_S = 5;

const BC=8, BR_=3, BW=Math.floor((VW-24)/BC-4), BH=18, BG=4;
const BL = (VW-(BC*(BW+BG)-BG))/2;
const BT = MID-(BR_*(BH+BG))/2;  // 357
const BCOLS=['#c77dff','#ff9900','#00e676','#ffbe00','#ff6bce','#4fc3f7'];

// ── 속도 (가상 픽셀/프레임) ──
const SPEEDS={ slow:3.0, norm:4.2, fast:5.8 };
let ballSpd = SPEEDS.norm;

// ── State ──
let S='TITLE';
let p1={x:GW/2,w:PW,score:0}, p2={x:GW/2,w:PW,score:0};
let ball={x:GW/2,y:MID,vx:0,vy:0,active:false,trail:[]};
let bricks=[],parts=[],flash={who:0,t:0};
let rdyT=0,fc=0,winner='';
let tx1=GW/2,tx2=GW/2;
let serveDir=1; // 득점마다 반전 → 양쪽 교대 서브

// ── Audio ──
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(f,d,t='square',v=0.1){
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d);}catch(e){}
}
const sfxPad=()=>beep(300,0.05);
const sfxWall=()=>beep(200,0.04,'sine',0.07);
const sfxBrk=()=>beep(400,0.07,'square',0.1);
const sfxPt=p=>{const f=p===1?[523,659,784]:[440,330,220];f.forEach((v,i)=>setTimeout(()=>beep(v,0.1,'sine',0.12),i*70));};
const sfxWin=()=>{[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.13,'sine',0.14),i*80));};

// ── 벽돌 ──
function mkBricks(){
  bricks=[];
  for(let r=0;r<BR_;r++) for(let c=0;c<BC;c++){
    if(Math.random()<0.12)continue;
    bricks.push({x:BL+c*(BW+BG),y:BT+r*(BH+BG),
      hp:Math.random()<0.18?2:1,
      color:BCOLS[Math.floor(Math.random()*BCOLS.length)],fl:0,sx:0});
  }
}
function launchBall(dir){
  const a=(Math.random()-0.5)*0.65;
  ball.x=GW/2;ball.y=MID;
  ball.vx=Math.sin(a)*ballSpd;ball.vy=-dir*Math.cos(a)*ballSpd;
  ball.active=true;ball.trail=[];
}
function startGame(){mkBricks();launchBall(serveDir);S='PLAY';}
function resetGame(){p1.score=0;p2.score=0;p1.x=GW/2;p2.x=GW/2;ball.active=false;parts=[];serveDir=Math.random()<0.5?1:-1;startGame();}

// ── 입력 (실제 좌표 → 가상 좌표 변환) ──
function toVX(clientX){return clientX*(VW/RW);}
function toVY(clientY){return clientY*(VH/RH);}
document.addEventListener('touchstart',e=>{e.preventDefault();getAC();},{passive:false});
document.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.touches){
    const vy=toVY(t.clientY);
    if(vy>MID) tx1=toVX(t.clientX); else tx2=toVX(t.clientX);
  }
},{passive:false});
document.addEventListener('mousemove',e=>{
  const vy=toVY(e.clientY);
  if(vy>MID) tx1=toVX(e.clientX); else tx2=toVX(e.clientX);
});

// ── 버튼 ──
const btnStart=document.getElementById('btnStart');
const btnAction=document.getElementById('btnAction');
const speedWrap=document.getElementById('speedWrap');
const spdBtns={slow:document.getElementById('spdSlow'),norm:document.getElementById('spdNorm'),fast:document.getElementById('spdFast')};

function selectSpd(k){
  ballSpd=SPEEDS[k];
  Object.entries(spdBtns).forEach(([key,b])=>b.classList.toggle('off',key!==k));
}
selectSpd('norm');
Object.entries(spdBtns).forEach(([k,b])=>{
  b.addEventListener('click',e=>{e.stopPropagation();selectSpd(k);});
  b.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();selectSpd(k);},{passive:false});
});

function syncBtns(){
  const show=S==='TITLE'||S==='WIN';
  speedWrap.style.display=show?'flex':'none';
  if(S==='TITLE'){btnStart.style.display='block';btnAction.style.display='none';}
  else if(S==='WIN'){
    btnStart.style.display='none';btnAction.style.display='block';
    btnAction.textContent='↺ 다시 하기';
    Object.assign(btnAction.style,{borderColor:'rgba(0,212,255,0.55)',color:'#00d4ff',
      boxShadow:'0 0 16px rgba(0,212,255,0.30)',textShadow:'0 0 10px #00d4ff'});
  }else{btnStart.style.display='none';btnAction.style.display='none';}
}
function requestFS(){
  const el=document.documentElement;
  const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(fn) fn.call(el).catch(()=>{});
  if(screen.orientation&&screen.orientation.lock)
    screen.orientation.lock('portrait').catch(()=>{});
}
function onStart(){if(S==='TITLE'||S==='WIN'){requestFS();S='READY';rdyT=90;resetGame();syncBtns();}}
['click','touchend'].forEach(ev=>{
  btnStart.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();onStart();});
  btnAction.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();onStart();});
});
syncBtns();

// ── 파티클 ──
function burst(x,y,color,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*3+1,a:1,color,life:Math.random()*18+10});
  }
}

// ── Update ──
function update(){
  fc++;
  if(S==='READY'){if(--rdyT<=0)S='PLAY';return;}
  if(S!=='PLAY')return;

  p1.x+=(Math.max(p1.w/2,Math.min(GW-p1.w/2,tx1))-p1.x)*0.22;
  p2.x+=(Math.max(p2.w/2,Math.min(GW-p2.w/2,tx2))-p2.x)*0.22;

  if(!ball.active)return;
  ball.trail.unshift({x:ball.x,y:ball.y});
  if(ball.trail.length>10)ball.trail.pop();
  ball.x+=ball.vx;ball.y+=ball.vy;

  if(ball.x-BR<=0){ball.x=BR;ball.vx=Math.abs(ball.vx);sfxWall();}
  if(ball.x+BR>=GW){ball.x=GW-BR;ball.vx=-Math.abs(ball.vx);sfxWall();}

  // P1 패들
  if(ball.vy>0&&ball.y+BR>=P1_Y&&ball.y+BR<=P1_Y+PH+Math.abs(ball.vy)+4
     &&ball.x>=p1.x-p1.w/2&&ball.x<=p1.x+p1.w/2){
    const rel=(ball.x-(p1.x-p1.w/2))/p1.w;
    const sp=Math.hypot(ball.vx,ball.vy)*1.03;
    const ang=-(Math.PI/6+rel*(Math.PI*2/3));
    ball.vx=Math.cos(ang)*sp;ball.vy=-Math.abs(Math.sin(ang)*sp);
    ball.y=P1_Y-BR;sfxPad();burst(ball.x,P1_Y,C1,6);
  }
  // P2 패들
  if(ball.vy<0&&ball.y-BR<=P2_Y+PH&&ball.y-BR>=P2_Y-Math.abs(ball.vy)-4
     &&ball.x>=p2.x-p2.w/2&&ball.x<=p2.x+p2.w/2){
    const rel=(ball.x-(p2.x-p2.w/2))/p2.w;
    const sp=Math.hypot(ball.vx,ball.vy)*1.03;
    const ang=Math.PI/6+rel*(Math.PI*2/3);
    ball.vx=Math.cos(Math.PI-ang)*sp;ball.vy=Math.abs(Math.sin(ang)*sp);
    ball.y=P2_Y+PH+BR;sfxPad();burst(ball.x,P2_Y+PH,C2,6);
  }

  // 벽돌
  bricks.forEach(b=>{
    if(b.hp<=0)return;
    const cx=Math.max(b.x,Math.min(ball.x,b.x+BW));
    const cy=Math.max(b.y,Math.min(ball.y,b.y+BH));
    if(Math.hypot(ball.x-cx,ball.y-cy)<BR){
      b.hp--;b.fl=6;b.sx=(Math.random()-.5)*3;sfxBrk();
      burst(b.x+BW/2,b.y+BH/2,b.color,b.hp<=0?12:5);
      Math.abs(ball.x-cx)>Math.abs(ball.y-cy)?ball.vx=-ball.vx:ball.vy=-ball.vy;
    }
  });
  bricks.forEach(b=>b.sx*=0.7);
  if(!bricks.some(b=>b.hp>0))mkBricks();

  if(ball.y<-BR*3){
    p1.score++;sfxPt(1);burst(ball.x,0,C1,20);
    flash={who:1,t:90};ball.active=false;
    serveDir*=-1; // 서브 방향 반전
    checkWin()||setTimeout(()=>launchBall(serveDir),1000);
  }
  if(ball.y>GH+BR*3){
    p2.score++;sfxPt(2);burst(ball.x,GH,C2,20);
    flash={who:2,t:90};ball.active=false;
    serveDir*=-1; // 서브 방향 반전
    checkWin()||setTimeout(()=>launchBall(serveDir),1000);
  }

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;p.a=p.life/28;});
  parts=parts.filter(p=>p.life>0);
  if(flash.t>0)flash.t--;
}
function checkWin(){
  if(p1.score>=WIN_S){winner='P1';S='WIN';sfxWin();syncBtns();return true;}
  if(p2.score>=WIN_S){winner='P2';S='WIN';sfxWin();syncBtns();return true;}
  return false;
}

// ── Draw helpers ──
function T(str,x,y,size,color,glow=0){
  ctx.save();
  ctx.font=PX(size);ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=color;
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=glow;}
  ctx.fillText(str,x,y);
  ctx.shadowBlur=0;ctx.restore();
}
function grid(){
  ctx.strokeStyle='rgba(140,50,255,0.06)';ctx.lineWidth=0.5;
  for(let x=0;x<=GW;x+=GW/10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GH);ctx.stroke();}
  for(let y=0;y<=GH;y+=GH/14){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GW,y);ctx.stroke();}
}
function divLine(){
  ctx.save();ctx.strokeStyle='rgba(200,100,255,0.20)';ctx.lineWidth=0.8;ctx.setLineDash([6,8]);
  ctx.beginPath();ctx.moveTo(0,MID);ctx.lineTo(GW,MID);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function drawPaddle(p,y,color){
  const px=p.x-p.w/2;
  ctx.save();ctx.shadowColor=color;ctx.shadowBlur=16;
  const g=ctx.createLinearGradient(px,y,px+p.w,y+PH);
  g.addColorStop(0,color+'aa');g.addColorStop(0.5,color);g.addColorStop(1,color+'aa');
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(px,y,p.w,PH,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.roundRect(px+4,y+3,p.w-8,PH*0.3,3);ctx.fill();
  ctx.restore();
}
function drawBall(){
  if(!ball.active)return;
  ball.trail.forEach((t,i)=>{
    ctx.beginPath();ctx.arc(t.x,t.y,BR*(1-i/ball.trail.length)*0.7,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(1-i/ball.trail.length)*0.15})`;ctx.fill();
  });
  ctx.save();ctx.shadowColor='#fff';ctx.shadowBlur=16;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.restore();
}
function drawBrick(b){
  if(b.hp<=0)return;
  const x=b.x+b.sx;
  ctx.save();
  if(b.fl>0){ctx.globalAlpha=0.4+0.6*(b.fl%2);b.fl--;}
  ctx.shadowColor=b.color;ctx.shadowBlur=5;
  const g=ctx.createLinearGradient(x,b.y,x,b.y+BH);
  g.addColorStop(0,b.color+'ee');g.addColorStop(1,b.color+'88');
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x+2,b.y+2,BW-4,BH-4,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath();ctx.roundRect(x+3,b.y+3,BW-6,BH*0.3,2);ctx.fill();
  ctx.restore();
}
function scanlines(){
  for(let y=0;y<GH;y+=5){ctx.fillStyle='rgba(0,0,0,0.035)';ctx.fillRect(0,y,GW,2);}
}

// ══════════════════════════════════════════════
//  레이아웃 (가상 픽셀 고정값)
//
//  TITLE:
//    P2 영역  y=0~390
//      P2 라벨(뒤집힘)  translateY=22  visual_y=22
//      위쪽터치(뒤집힘)              visual_y=70
//    RETRO   y=185    (위쪽터치 하단70+10=80 → 간격 95px)
//    BREAK   y=238
//    2P BATTLE y=282
//    P1 영역  y=390~780
//      먼저5점 y=315 (중앙선 위)
//      P1 라벨 y=470
//      아래쪽터치 y=510
//
//  GAME:
//    P2 score  translateY=160  visual_y=160
//    P2 label  local=-58       visual_y=218  (간격 13px)
//    P1 score  y=620
//    P1 label  y=682           (간격 17px)
// ══════════════════════════════════════════════
function draw(){
  const bg=ctx.createRadialGradient(GW/2,MID,10,GW/2,MID,GH);
  bg.addColorStop(0,'#0a0025');bg.addColorStop(1,'#040010');
  ctx.fillStyle=bg;ctx.fillRect(0,0,GW,GH);
  grid();

  // ── 타이틀 ──
  if(S==='TITLE'){
    for(let i=0;i<55;i++){
      const sx=(Math.sin(i*137.5)*380+380)%GW, sy=(Math.cos(i*137.5)*760+760)%GH;
      ctx.fillStyle=`rgba(200,200,255,${0.18+Math.sin(fc*0.05+i)*0.22})`;
      ctx.beginPath();ctx.arc(sx,sy,1.2,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(255,45,106,0.07)';ctx.fillRect(0,0,GW,MID);
    ctx.fillStyle='rgba(0,212,255,0.07)';ctx.fillRect(0,MID,GW,MID);
    divLine();

    // P2 안내 (상단, 뒤집힘)
    // translateY=22 → P2 at visual_y=22, 위쪽터치 at visual_y=70
    ctx.save();
    ctx.translate(GW/2, 22); ctx.rotate(Math.PI);
    T('P2',       0,   0, F.guide,  C2, 10);
    T('위쪽 터치', 0, -48, F.guide2, 'rgba(255,45,106,0.85)');
    ctx.restore();

    // 타이틀 (간격 확보: 위쪽터치 하단≈80, RETRO 상단≈166)
    T('RETRO',     GW/2, 185, F.title, '#c77dff', 18);
    T('BREAK',     GW/2, 238, F.title, '#c77dff', 18);
    T('2P BATTLE', GW/2, 282, F.sub,   '#ff6bce');

    // 안내
    if(Math.floor(fc/30)%2===0)
      T('먼저 '+WIN_S+'점 승리!', GW/2, 315, 16, 'rgba(200,200,255,0.55)');

    // P1 안내 (하단)
    T('P1',        GW/2, 470, F.guide,  C1, 10);
    T('아래쪽 터치', GW/2, 510, F.guide2, 'rgba(0,212,255,0.85)');

    scanlines();return;
  }

  // ── 게임 화면 ──
  divLine();
  bricks.forEach(drawBrick);
  parts.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.a);
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  drawPaddle(p2,P2_Y,C2);drawPaddle(p1,P1_Y,C1);drawBall();

  // HUD — P2 점수 (위, 뒤집힘)
  // translateY=155: score at y=155, label(local=-42) at y=197
  ctx.save();
  ctx.translate(GW/2,155);ctx.rotate(Math.PI);
  T(p2.score, 0,   0, F.score, C2, 14);
  T('P2',     0, -42, F.label, 'rgba(255,45,106,0.8)');
  ctx.restore();

  // HUD — P1 점수 (아래)
  // score at y=625, label at y=667
  T(p1.score, GW/2, 625, F.score, C1, 14);
  T('P1',     GW/2, 667, F.label, 'rgba(0,212,255,0.8)');

  // 승점 도트
  const dr=9, dg=GW*0.07, dw=(WIN_S-1)*dg, dotX=GW/2-dw/2;
  for(let i=0;i<WIN_S;i++){
    const on=i<p2.score;
    ctx.beginPath();ctx.arc(dotX+i*dg,13,dr,0,Math.PI*2);
    ctx.fillStyle=on?C2:'rgba(255,45,106,0.15)';
    ctx.shadowColor=on?C2:'transparent';ctx.shadowBlur=on?10:0;ctx.fill();
  }
  for(let i=0;i<WIN_S;i++){
    const on=i<p1.score;
    ctx.beginPath();ctx.arc(dotX+i*dg,GH-13,dr,0,Math.PI*2);
    ctx.fillStyle=on?C1:'rgba(0,212,255,0.15)';
    ctx.shadowColor=on?C1:'transparent';ctx.shadowBlur=on?10:0;ctx.fill();
  }
  ctx.shadowBlur=0;

  // 득점 플래시
  // P1: cy=480 → 점수(625) 훨씬 위에 표시
  // P2: cy=300 → 뒤집혀서 P2 존 상단에 표시
  if(flash.t>0){
    const who=flash.who,color=who===1?C1:C2;
    const cy=who===1?480:300;
    ctx.save();ctx.globalAlpha=flash.t/90;
    if(who===2){ctx.translate(GW/2,cy);ctx.rotate(Math.PI);ctx.translate(-GW/2,-cy);}
    T(who===1?'P1':'P2', GW/2, cy-38, F.flash,  color, 16);
    T('득점!',            GW/2, cy+32, F.flash2, color, 10);
    ctx.restore();
  }

  // READY
  if(S==='READY'){
    ctx.fillStyle='rgba(4,0,16,0.62)';ctx.fillRect(0,0,GW,GH);
    const t=Math.ceil(rdyT/30);
    if(rdyT>30) T(t,    GW/2,MID,F.count,                  '#ffbe00',38);
    else         T('GO!',GW/2,MID,Math.floor(F.count*0.7), '#00e676',38);
  }

  // WIN
  if(S==='WIN'){
    const wc=winner==='P1'?C1:C2;
    ctx.fillStyle='rgba(4,0,16,0.88)';ctx.fillRect(0,0,GW,GH);
    T(winner,       GW/2, 248, F.win,    wc, 24);
    T('승리!',       GW/2, 334, F.win2,   wc, 16);
    T('최종 스코어', GW/2, 430, F.winSub, '#aaa');
    T('P2 '+p2.score+' : '+p1.score+' P1', GW/2, 470, F.winSc, '#fff');
  }

  scanlines();
}

function resizeCanvas(){
  const rw=window.innerWidth, rh=window.innerHeight;
  canvas.width=rw; canvas.height=rh;
  canvas.style.width=rw+'px'; canvas.style.height=rh+'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(rw/VW, rh/VH);
}
window.addEventListener('resize', resizeCanvas);
document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('webkitfullscreenchange', resizeCanvas);

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
